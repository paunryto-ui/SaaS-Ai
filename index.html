<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SaaS AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;padding:0;font-family:'Inter',sans-serif;overflow:hidden;transition:background .2s,color .2s}

  /* THEME VARS */
  body.light{--bg:#ffffff;--bg2:#f9fafb;--bg3:#f4f4f4;--border:#e5e7eb;--border2:#d1d5db;--text:#0d0d0d;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;--hover:#f4f4f4;--active:#ececec;--bubble:#f4f4f4;--input-bg:#ffffff;--input-shadow:0 0 0 1px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.06);--input-shadow-focus:0 0 0 1px rgba(0,0,0,.06),0 2px 12px rgba(0,0,0,.1);--send-off:#d1d5db;--send-on:#000;--scroll-thumb:#d1d5db;--card-border:#e5e7eb;--card-hover:#f9fafb;--badge-bg:#fff;--code-bg:#f9fafb;--code-head:#f4f4f4;--code-text:#0d0d0d;--warn-bg:#fef2f2;--warn-border:#fecaca;--warn-text:#dc2626}
  body.dark{--bg:#212121;--bg2:#2d2d2d;--bg3:#383838;--border:#3a3a3a;--border2:#4a4a4a;--text:#ececec;--text2:#d4d4d4;--text3:#a0a0a0;--text4:#666;--hover:#2a2a2a;--active:#303030;--bubble:#2f2f2f;--input-bg:#2f2f2f;--input-shadow:0 0 0 1px rgba(255,255,255,.04),0 2px 8px rgba(0,0,0,.3);--input-shadow-focus:0 0 0 1px rgba(255,255,255,.08),0 2px 12px rgba(0,0,0,.4);--send-off:#4a4a4a;--send-on:#fff;--scroll-thumb:#3a3a3a;--card-border:#3a3a3a;--card-hover:#2a2a2a;--badge-bg:#2d2d2d;--code-bg:#1a1a1a;--code-head:#222;--code-text:#e0e0e0;--warn-bg:#3b1515;--warn-border:#7f1d1d;--warn-text:#fca5a5}

  body{background:var(--bg);color:var(--text)}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:9px}
  ::-webkit-scrollbar-track{background:transparent}
  textarea::-webkit-scrollbar{display:none}

  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes throb{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.5)}}
  .fade-up{animation:fadeUp .3s ease both}
  #sidebar{transition:transform .25s cubic-bezier(.16,1,.3,1)}

  .sidebar-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:14px;color:var(--text);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .15s}
  .sidebar-btn:hover{background:var(--hover)}

  .hist-item{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
  .hist-item:hover{background:var(--hover)}
  .hist-item.active{background:var(--active)}
  .hist-title{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .hist-del{opacity:0;font-size:11px;padding:2px 5px;border:none;background:none;cursor:pointer;color:var(--text4);border-radius:4px;flex-shrink:0;transition:opacity .15s,color .15s}
  .hist-item:hover .hist-del{opacity:1}
  .hist-del:hover{color:#ef4444}

  .msg-user{display:flex;justify-content:flex-end;margin-bottom:20px}
  .msg-user .bubble{background:var(--bubble);border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:75%;font-size:15px;line-height:1.65;color:var(--text);word-break:break-word;border:1px solid var(--border)}
  .msg-ai{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}
  .ai-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:transparent}
  .ai-avatar img{width:100%;height:100%;object-fit:contain}
  .msg-ai .content{flex:1;min-width:0;font-size:15px;line-height:1.7;color:var(--text);word-break:break-word}

  .md-content p{margin:4px 0 10px;line-height:1.7;color:var(--text)}
  .md-content h1{font-size:19px;font-weight:700;color:var(--text);margin:14px 0 6px}
  .md-content h2{font-size:16px;font-weight:700;color:var(--text);margin:12px 0 5px}
  .md-content h3{font-size:14px;font-weight:600;color:var(--text);margin:10px 0 4px}
  .md-content ul,.md-content ol{padding-left:22px;margin:6px 0 10px}
  .md-content li{margin:4px 0;color:var(--text);line-height:1.65}
  .md-content blockquote{border-left:3px solid var(--border2);padding-left:14px;color:var(--text3);font-style:italic;margin:8px 0}
  .md-content hr{border:none;border-top:1px solid var(--border);margin:12px 0}
  .md-content strong{color:var(--text);font-weight:700}
  .md-content em{color:var(--text2);font-style:italic}
  .md-content a{color:#2563eb;text-decoration:underline}

  .cb{border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--code-bg);margin:10px 0}
  .cb-head{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--code-head)}
  .cb-lang{font-family:monospace;font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:500}
  .cb pre{padding:14px;overflow-x:auto;margin:0}
  .cb code{font-family:monospace;font-size:12px;color:var(--code-text);line-height:1.7;white-space:pre}
  .cp-btn{font-family:monospace;font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text3);cursor:pointer;transition:all .14s;font-weight:500}
  .cp-btn:hover{background:var(--hover);color:var(--text)}
  .ic{font-family:monospace;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--text)}

  #inputWrap{border-radius:16px;border:1px solid var(--border2);background:var(--input-bg);box-shadow:var(--input-shadow);transition:box-shadow .15s,border-color .15s}
  #inputWrap:focus-within{border-color:var(--border2);box-shadow:var(--input-shadow-focus)}
  #inp{font-size:15px;background:transparent;color:var(--text);outline:none;resize:none;width:100%;max-height:200px;overflow-y:auto;caret-color:var(--text);line-height:1.6;padding:0}
  #inp::placeholder{color:var(--text4)}

  #sendBtn{width:34px;height:34px;border-radius:8px;border:none;cursor:not-allowed;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;background:var(--send-off)}
  #sendBtn.active{background:var(--send-on);cursor:pointer}

  .sug-card{border:1px solid var(--card-border);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text2);cursor:pointer;background:var(--bg);text-align:left;line-height:1.4;transition:background .15s,border-color .15s;width:100%}
  .sug-card:hover{background:var(--card-hover);border-color:var(--border2)}

  .model-badge{font-size:13px;color:var(--text2);font-weight:500;display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);cursor:default;background:var(--badge-bg);user-select:none}

  .dot{width:6px;height:6px;border-radius:50%;background:var(--text4);display:inline-block;animation:throb 1.4s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}

  .topbar-btn{border:none;background:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--text3);line-height:0;transition:background .15s}
  .topbar-btn:hover{background:var(--hover)}
  .tool-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:9px;border:none;background:none;cursor:pointer;font-size:13.5px;color:var(--text);text-align:left;transition:background .12s;font-family:'Inter',sans-serif}
  .tool-item:hover{background:var(--hover)}
  .tool-item .tool-icon{font-size:15px;width:20px;flex-shrink:0;text-align:center}
</style>
</head>

var MSG_LIMIT=550;
var SUGGESTS=[
  {icon:'💡',title:'Ide & Kreativitas',text:'Berikan saya ide bisnis unik untuk 2025'},
  {icon:'💻',title:'Kode & Programming',text:'Jelaskan cara membuat REST API dengan Node.js'},

];

// THEME
function toggleTheme(){
  isDark=!isDark;
  document.body.className=isDark?'dark':'light';
  var ico=document.getElementById('themeIco');
  if(isDark){
    ico.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    ico.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
  updateSendBtn();
  try{localStorage.setItem('saas_theme',isDark?'dark':'light');}catch(e){}
}

// INIT
(function init(){
  try{
    var t=localStorage.getItem('saas_theme');
    if(t==='dark'){isDark=true;document.body.className='dark';
      document.getElementById('themeIco').innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }
  }catch(e){}

  var w=document.getElementById('suggests');
  SUGGESTS.forEach(function(s){
    var b=document.createElement('button');
    b.className='sug-card';
    b.innerHTML='<div style="font-size:18px;margin-bottom:6px">'+s.icon+'</div>'
      +'<div style="font-weight:600;font-size:13px;margin-bottom:2px">'+s.title+'</div>'
      +'<div style="font-size:12px;color:var(--text4);line-height:1.4">'+s.text+'</div>';
    b.onclick=function(){document.getElementById('inp').value=s.text;onInpChange();document.getElementById('inp').focus();};
    w.appendChild(b);
  });
  loadLimit();
  updateSendBtn();
})();

// LIMIT
function isLimitReached(){return msgCount>=MSG_LIMIT;}
function loadLimit(){
  try{var raw=localStorage.getItem('saas_limit');if(raw){var d=JSON.parse(raw);if(d.date===new Date().toDateString())msgCount=d.count||0;}}catch(e){}
  updateLimitUI();
}
function saveLimit(c){
  msgCount=c;
  try{localStorage.setItem('saas_limit',JSON.stringify({count:c,date:new Date().toDateString()}));}catch(e){}
  updateLimitUI();
}
function updateLimitUI(){
  var s=document.getElementById('limitSmall');
  if(s)s.textContent=msgCount+' / '+MSG_LIMIT+' pesan hari ini';
  var w=document.getElementById('limitWarnBar');
  if(isLimitReached()){w.style.display='block';w.textContent='Limit harian tercapai. Bisa chat lagi besok pukul 02:00.';}
  else w.style.display='none';
  updateSendBtn();
}

function openSidebar(){document.getElementById('sidebar').style.transform='translateX(0)';document.getElementById('overlay').style.display='block';}
function closeSidebar(){document.getElementById('sidebar').style.transform='translateX(-100%)';document.getElementById('overlay').style.display='none';}

function onInpChange(){var ta=document.getElementById('inp');ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,200)+'px';updateSendBtn();}
function onInpKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}

function updateSendBtn(){
  var canSend=!loading&&(document.getElementById('inp').value.trim().length>0||images.length>0)&&!isLimitReached();
  var btn=document.getElementById('sendBtn');
  var ico=document.getElementById('sendIco');
  if(canSend){btn.classList.add('active');btn.style.background=isDark?'#fff':'#000';}
  else{btn.classList.remove('active');btn.style.background='var(--send-off)';}
  ico.setAttribute('stroke',canSend?(isDark?'#000':'#fff'):'var(--text4)');
}

function onFile(e){
  Array.from(e.target.files||[]).forEach(function(f){
    var r=new FileReader();
    r.onload=function(ev){images.push({url:ev.target.result});renderThumbs();updateSendBtn();};
    r.readAsDataURL(f);
  });e.target.value='';
}
function renderThumbs(){
  var w=document.getElementById('imgThumbs');w.innerHTML='';
  images.forEach(function(img,i){
    var d=document.createElement('div');
    d.style.cssText='position:relative;width:52px;height:52px;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0';
    d.innerHTML='<img src="'+img.url+'" style="width:100%;height:100%;object-fit:cover"/>'
      +'<button onclick="removeImg('+i+')" style="position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>';
    w.appendChild(d);
  });
}
function removeImg(i){images.splice(i,1);renderThumbs();updateSendBtn();}

function getCur(){for(var i=0;i<sessions.length;i++)if(sessions[i].id===curId)return sessions[i];return null;}
function newChat(){var id=String(Date.now());sessions.unshift({id:id,title:'Chat baru',msgs:[]});curId=id;images=[];renderThumbs();renderHistory();renderMsgs();closeSidebar();}
function loadSess(id){curId=id;images=[];renderThumbs();renderHistory();renderMsgs();closeSidebar();}
function delSess(id,e){e.stopPropagation();sessions=sessions.filter(function(s){return s.id!==id;});if(curId===id)curId=sessions.length?sessions[0].id:null;renderHistory();renderMsgs();}

function renderHistory(){
  var w=document.getElementById('histList'),e=document.getElementById('histEmpty');
  w.innerHTML='';e.style.display=sessions.length?'none':'block';
  sessions.forEach(function(s){
    var d=document.createElement('div');
    d.className='hist-item'+(s.id===curId?' active':'');
    d.innerHTML='<span class="hist-title">'+escHtml(s.title)+'</span>'
      +'<button class="hist-del" onclick="delSess(\''+s.id+'\',event)">✕</button>';
    d.onclick=function(){loadSess(s.id);};w.appendChild(d);
  });
}

function renderMsgs(){
  var sess=getCur(),msgsEl=document.getElementById('msgsEl'),emptyEl=document.getElementById('emptyEl');
  if(!sess||sess.msgs.length===0){msgsEl.style.display='none';emptyEl.style.display='flex';return;}
  emptyEl.style.display='none';msgsEl.style.display='block';
  var html='<div style="max-width:720px;margin:0 auto;padding:24px 16px 8px">';
  sess.msgs.forEach(function(m){html+=msgHTML(m);});
  if(loading)html+=typingHTML();
  html+='</div>';
  msgsEl.innerHTML=html;msgsEl.scrollTop=msgsEl.scrollHeight;
}

function msgHTML(m){
  if(m.role==='user'){
    var imgs='';
    (m._imgs||[]).forEach(function(u){imgs+='<img src="'+u+'" style="max-width:200px;border-radius:10px;margin-bottom:8px;display:block;border:1px solid var(--border)" alt=""/>';});
    var text=typeof m.content==='string'?escHtml(m.content):'';
    if(Array.isArray(m.content))m.content.forEach(function(c){if(c.type==='text')text=escHtml(c.text);});
    return '<div class="msg-user fade-up"><div class="bubble">'+imgs+text+'</div></div>';
  }
  return '<div class="msg-ai fade-up">'
    +'<div class="ai-avatar"><img src="'+LOGO_SRC+'" style="width:28px;height:28px;object-fit:contain" alt=""/></div>'
    +'<div class="content md-content">'+parseMd(m.content)+'</div></div>';
}

function typingHTML(){
  return '<div class="msg-ai"><div class="ai-avatar"><img src="'+LOGO_SRC+'" style="width:28px;height:28px;object-fit:contain" alt=""/></div>'
    +'<div class="content" style="padding-top:6px"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
}

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseMd(text){
  text=text.replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,lang,code){
    return '<div class="cb"><div class="cb-head"><span class="cb-lang">'+(lang||'code')+'</span>'
      +'<button class="cp-btn" onclick="cpCode(this)">Salin</button></div>'
      +'<pre><code>'+escHtml(code.trim())+'</code></pre></div>';
  });
  text=text.replace(/`([^`\n]+)`/g,'<span class="ic">$1</span>');
  text=text.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.+?)\*/g,'<em>$1</em>');
  text=text.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  text=text.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  text=text.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  text=text.replace(/^---$/gm,'<hr>');
  text=text.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  text=text.replace(/((?:^[-*] .+\n?)+)/gm,function(m){return '<ul>'+m.trim().split('\n').map(function(l){return '<li>'+l.replace(/^[-*] /,'')+'</li>';}).join('')+'</ul>';});
  text=text.replace(/((?:^\d+\. .+\n?)+)/gm,function(m){return '<ol>'+m.trim().split('\n').map(function(l){return '<li>'+l.replace(/^\d+\. /,'')+'</li>';}).join('')+'</ol>';});
  return text.split(/\n{2,}/).map(function(b){b=b.trim();if(!b)return '';if(/^<(h[1-3]|ul|ol|hr|blockquote|div)/.test(b))return b;return '<p>'+b.replace(/\n/g,'<br>')+'</p>';}).join('');
}
function cpCode(btn){var code=btn.closest('.cb').querySelector('code').textContent;navigator.clipboard&&navigator.clipboard.writeText(code).then(function(){btn.textContent='Tersalin!';setTimeout(function(){btn.textContent='Salin';},1500);});}

function toggleTools(){
  var m=document.getElementById('toolsMenu');
  var open=m.style.display==='block';
  m.style.display=open?'none':'block';
  if(!open){
    document.getElementById('toolsBtn').style.background='var(--hover)';
    document.getElementById('toolsBtn').style.transform='rotate(45deg)';
  } else {
    document.getElementById('toolsBtn').style.background='';
    document.getElementById('toolsBtn').style.transform='';
  }
}
function closeTools(){
  document.getElementById('toolsMenu').style.display='none';
  document.getElementById('toolsBtn').style.background='';
  document.getElementById('toolsBtn').style.transform='';
}
function insertPrompt(text){
  var inp=document.getElementById('inp');
  inp.value=text;
  onInpChange();
  inp.focus();
  inp.setSelectionRange(text.length,text.length);
}
// Close tools when clicking outside
document.addEventListener('click',function(e){
  var menu=document.getElementById('toolsMenu');
  var btn=document.getElementById('toolsBtn');
  if(menu&&menu.style.display==='block'&&!menu.contains(e.target)&&!btn.contains(e.target)){
    closeTools();
  }
});

function send(){
  var text=document.getElementById('inp').value.trim();
  if((!text&&images.length===0)||loading||isLimitReached())return;
  if(!curId){var id=String(Date.now());sessions.unshift({id:id,title:text.slice(0,40)||'Chat baru',msgs:[]});curId=id;renderHistory();}
  var userContent;
  if(images.length>0){userContent=images.map(function(img){return{type:'image_url',image_url:{url:img.url}};});userContent.push({type:'text',text:text||'Analisis gambar ini.'});}
  else userContent=text;
  var userMsg={role:'user',content:userContent,_imgs:images.map(function(x){return x.url;})};
  getCur().msgs.push(userMsg);
  document.getElementById('inp').value='';document.getElementById('inp').style.height='auto';
  images=[];renderThumbs();loading=true;updateSendBtn();renderMsgs();
  var history=getCur().msgs.slice(-20).map(function(m){return{role:m.role,content:m.content};});
  fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_K,'HTTP-Referer':'https://saas-ai.app','X-Title':'SaaS AI'},
    body:JSON.stringify({model:MODEL,max_tokens:2048,temperature:0.7,
      messages:[{role:'system',content:'Kamu adalah SaaS AI, asisten AI yang cerdas, ramah, dan sangat membantu. Jawab dalam bahasa yang sama dengan pengguna. Gunakan markdown untuk format yang rapi jika diperlukan.'}].concat(history)
    })
  })
  .then(function(res){if(!res.ok)return res.json().then(function(e){throw new Error(e.error&&e.error.message?e.error.message:'HTTP '+res.status);});return res.json();})
  .then(function(data){
    var reply=data.choices&&data.choices[0]&&data.choices[0].message?data.choices[0].message.content:'Tidak ada respons.';
    var used=data.usage&&data.usage.total_tokens?data.usage.total_tokens:0;
    totalTok+=used;
    if(totalTok>0)document.getElementById('tokenCount').textContent=totalTok.toLocaleString()+' tokens';
    var sess=getCur();if(sess.title==='Chat baru')sess.title=text.slice(0,40)||'Chat';
    sess.msgs.push({role:'assistant',content:reply});
    renderHistory();saveLimit(msgCount+1);
  })
  .catch(function(err){getCur().msgs.push({role:'assistant',content:'Error: '+err.message});})
  .finally(function(){loading=false;renderMsgs();updateSendBtn();});
}
</script>
